<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora AI</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

header{
padding:15px;
background:#1e293b;
text-align:center;
font-size:24px;
font-weight:bold;
}

#chat{
flex:1;
padding:15px;
overflow-y:auto;
}

.message{
padding:10px;
margin:10px 0;
border-radius:12px;
max-width:80%;
}

.user{
background:#2563eb;
margin-left:auto;
}

.ai{
background:#334155;
}

.input-area{
display:flex;
padding:10px;
background:#1e293b;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
}

button{
margin-left:10px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
}
</style>
</head>

<body>

<header>🚀 Nexora AI</header>

<div id="chat">
<div class="message ai">
Hello! I am Nexora AI. How can I help you today?
</div>
</div>

<div class="input-area">
<input id="msg" placeholder="Type a message...">
<button onclick="sendMessage()">Send</button>
</div>
<script>
async function sendMessage(){
let input=document.getElementById("msg");
let chat=document.getElementById("chat");

if(input.value.trim()=="") return;

let user=document.createElement("div");
user.className="message user";
user.innerText=input.value;
chat.appendChild(user);

const response = await fetch("/api/chat", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    message: input.value
})
});

const data = await response.json();

let ai=document.createElement("div");
ai.className="message ai";
ai.innerText=data.reply;
chat.appendChild(ai);

input.value="";
chat.scrollTop=chat.scrollHeight;
}
