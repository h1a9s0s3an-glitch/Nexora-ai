<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

header{
padding:15px;
background:#1e293b;
text-align:center;
font-size:24px;
font-weight:bold;
}

#chat{
flex:1;
padding:15px;
overflow-y:auto;
}

.message{
padding:12px;
margin:10px 0;
border-radius:12px;
max-width:80%;
}

.user{
background:#2563eb;
margin-left:auto;
}

.ai{
background:#334155;
}

.input-area{
display:flex;
padding:10px;
background:#1e293b;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
}

button{
margin-left:10px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<header>🚀 Nexora AI</header>

<div id="chat">
<div class="message ai">
Hello! I am Nexora AI. How can I help you today?
</div>
</div>

<div class="input-area">
<input id="msg" placeholder="Type a message...">
<button onclick="sendMessage()">Send</button>
</div>

<script>
function sendMessage(){

const input=document.getElementById("msg");
const chat=document.getElementById("chat");

if(!input.value.trim()) return;

let user=document.createElement("div");
user.className="message user";
user.innerText=input.value;
chat.appendChild(user);

let ai=document.createElement("div");
ai.className="message ai";
ai.innerText="⚠️ AI service is currently unavailable. Please try again later.";
chat.appendChild(ai);

input.value="";
chat.scrollTop=chat.scrollHeight;
}
</script>

</body>
</html>
