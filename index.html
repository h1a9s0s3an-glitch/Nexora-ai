<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
height:100vh;
background:#0f172a;
color:white;
}

.sidebar{
width:250px;
background:#111827;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.sidebar button{
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
background:#1e293b;
color:white;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

header{
padding:15px;
background:#1e293b;
font-size:24px;
font-weight:bold;
text-align:center;
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
}

.message{
padding:10px;
margin:10px 0;
border-radius:12px;
max-width:80%;
}

.user{
background:#2563eb;
margin-left:auto;
}

.ai{
background:#334155;
}

.input-area{
display:flex;
padding:10px;
background:#1e293b;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
}

.send-btn{
margin-left:10px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

@media(max-width:768px){
.sidebar{
width:80px;
}

.sidebar button{
font-size:12px;
padding:10px;
}
}
</style>
</head>

<body>

<div class="sidebar">
<button onclick="newChat()">➕ New Chat</button>
<button onclick="clearChat()">🗑 Clear</button>
<button onclick="shareChat()">📤 Share</button>
<button onclick="uploadImage()">🖼 Image</button>
<button>📌 Pin</button>
</div>

<div class="main">

<header>🚀 Nexora AI</header>

<div id="chat">
<div class="message ai">
Hello! I am Nexora AI. How can I help you today?
</div>
</div>

<div class="input-area">
<input id="msg" placeholder="Type a message...">
<button class="send-btn" onclick="sendMessage()">Send</button>
</div>

</div>

<script>

async function sendMessage(){

const input=document.getElementById("msg");
const chat=document.getElementById("chat");

if(!input.value.trim()) return;

const text=input.value;

let user=document.createElement("div");
user.className="message user";
user.innerText=text;
chat.appendChild(user);

input.value="";

let ai=document.createElement("div");
ai.className="message ai";
ai.innerText="⚠️ AI service is currently unavailable. Please try again later.";
chat.appendChild(ai);

chat.scrollTop=chat.scrollHeight;
}

function newChat(){
document.getElementById("chat").innerHTML=
'<div class="message ai">New chat started 🚀</div>';
}

function clearChat(){
document.getElementById("chat").innerHTML="";
}

function shareChat(){
navigator.clipboard.writeText(
document.getElementById("chat").innerText
);
alert("Chat copied to clipboard!");
}

function uploadImage(){
alert("Image upload coming soon!");
}

</script>

</body>
</html>
