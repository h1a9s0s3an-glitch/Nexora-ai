<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora v3.0</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
height:100vh;
display:flex;
flex-direction:column;
transition:.3s;
}

body.light{
background:#f5f5f5;
color:black;
}

header{
background:#1e293b;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:22px;
font-weight:bold;
}

body.light header{
background:#ddd;
color:black;
}

.theme-btn{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

.tab{
display:none;
flex:1;
overflow-y:auto;
}

.active{
display:block;
}

.page{
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:15px;
margin-top:15px;
}

body.light .card{
background:white;
color:black;
}

.stat{
font-size:30px;
font-weight:bold;
margin-top:10px;
}

#chat{
padding:15px;
height:calc(100vh - 220px);
overflow-y:auto;
}

.message{
padding:12px;
margin:10px 0;
border-radius:14px;
max-width:80%;
word-wrap:break-word;
}

.user{
background:#2563eb;
margin-left:auto;
}

.ai{
background:#334155;
}

body.light .ai{
background:#e5e5e5;
color:black;
}

.time{
font-size:11px;
opacity:.7;
margin-top:5px;
}

.input-area{
display:flex;
padding:10px;
background:#1e293b;
}

body.light .input-area{
background:#ddd;
}

.input-area input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
}

.send-btn{
margin-left:10px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

textarea{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
min-height:150px;
}

.save-btn{
margin-top:10px;
padding:10px 15px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

.bottom-nav{
height:70px;
background:#111827;
display:flex;
justify-content:space-around;
align-items:center;
}

.bottom-nav button{
background:none;
border:none;
color:white;
font-size:13px;
cursor:pointer;
}

body.light .bottom-nav{
background:#ccc;
}

body.light .bottom-nav button{
color:black;
}

</style>
</head>

<body>

<header>
🚀 Nexora v3.0
<button class="theme-btn" onclick="toggleTheme()">🌙</button>
</header>
<div id="homeTab" class="tab active page">

<h2>🏠 Dashboard</h2>

<div class="card">
Total Messages
<div class="stat" id="msgCount">0</div>
</div>

<div class="card">
Saved Notes
<div class="stat" id="noteCount">0</div>
</div>

<div class="card">
Projects
<div class="stat" id="projectCount">0</div>
</div>

</div>

<div id="chatTab" class="tab">

<div id="chat">

<div class="message ai">
Hello! I am Nexora AI 🚀
<div class="time">Now</div>
</div>

</div>

<div class="input-area">

<input
id="msg"
placeholder="Ask Nexora anything...">

<button
class="send-btn"
onclick="sendMessage()">
Send
</button>

</div>

</div>

<div id="notesTab" class="tab page">

<h2>📝 Notes</h2>

<textarea
id="notesArea"
placeholder="Write your notes here...">
</textarea>

<button
class="save-btn"
onclick="saveNotes()">
💾 Save Notes
</button>

</div>

<div id="projectsTab" class="tab page">

<h2>📊 Projects</h2>

<input
id="projectName"
placeholder="Project Name"
style="width:100%;padding:12px;border:none;border-radius:10px;">

<textarea
id="projectDesc"
placeholder="Project Description">
</textarea>

<button
class="save-btn"
onclick="addProject()">
➕ Add Project
</button>

<div id="projectsList"></div>

</div>

<div id="profileTab" class="tab page">

<h2>👤 Profile</h2>

<div class="card">

<input
id="profileName"
placeholder="Your Name"
style="width:100%;padding:12px;border:none;border-radius:10px;">

<button
class="save-btn"
onclick="saveProfile()">
💾 Save Profile
</button>

</div>

</div>

<div id="settingsTab" class="tab page">

<h2>⚙️ Settings</h2>

<div class="card">
Theme and preferences
</div>

</div>

<div class="bottom-nav">

<button onclick="showTab('homeTab')">
🏠<br>Home
</button>

<button onclick="showTab('chatTab')">
💬<br>Chat
</button>

<button onclick="showTab('notesTab')">
📝<br>Notes
</button>

<button onclick="showTab('projectsTab')">
📊<br>Projects
</button>

<button onclick="showTab('profileTab')">
👤<br>Profile
</button>

<button onclick="showTab('settingsTab')">
⚙️<br>Settings
</button>

</div>
<script>

let messageCount=
Number(localStorage.getItem("messageCount")||0);

function showTab(id){

document.querySelectorAll(".tab").forEach(tab=>{
tab.classList.remove("active");
});

document.getElementById(id).classList.add("active");

}

function updateDashboard(){

document.getElementById("msgCount").innerText=
messageCount;

document.getElementById("noteCount").innerText=
localStorage.getItem("notesData")?1:0;

const projects=
JSON.parse(localStorage.getItem("projects")||"[]");

document.getElementById("projectCount").innerText=
projects.length;

}

function getTime(){

return new Date().toLocaleTimeString([],{
hour:"2-digit",
minute:"2-digit"
});

}

async function sendMessage(){

const input=document.getElementById("msg");
const chat=document.getElementById("chat");

if(!input.value.trim()) return;

const text=input.value;

let user=document.createElement("div");
user.className="message user";
user.innerHTML=
text+
'<div class="time">'+getTime()+'</div>';

chat.appendChild(user);

input.value="";

let ai=document.createElement("div");
ai.className="message ai";
ai.innerHTML=
'⏳ Nexora is thinking...'+
'<div class="time">'+getTime()+'</div>';

chat.appendChild(ai);

chat.scrollTop=chat.scrollHeight;

try{

const response=await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
});

const data=await response.json();

ai.innerHTML=
(data.reply || "No response received.")+
'<div class="time">'+getTime()+'</div>';

messageCount++;

localStorage.setItem(
"messageCount",
messageCount
);

localStorage.setItem(
"nexoraChat",
chat.innerHTML
);

updateDashboard();

}catch(error){

ai.innerHTML=
'⚠️ Error connecting to Nexora AI.'+
'<div class="time">'+getTime()+'</div>';

}

chat.scrollTop=chat.scrollHeight;

}

function saveNotes(){

localStorage.setItem(
"notesData",
document.getElementById("notesArea").value
);

updateDashboard();

alert("Notes saved!");

}

function addProject(){

const name=
document.getElementById("projectName").value;

const desc=
document.getElementById("projectDesc").value;

if(!name) return;

const projects=
JSON.parse(localStorage.getItem("projects")||"[]");

projects.push({
name:name,
desc:desc
});

localStorage.setItem(
"projects",
JSON.stringify(projects)
);

renderProjects();
updateDashboard();

document.getElementById("projectName").value="";
document.getElementById("projectDesc").value="";

}

function renderProjects(){

const container=
document.getElementById("projectsList");

container.innerHTML="";

const projects=
JSON.parse(localStorage.getItem("projects")||"[]");

projects.forEach(project=>{

container.innerHTML+=
'<div class="card"><h3>'+
project.name+
'</h3><p>'+
project.desc+
'</p></div>';

});

}

function saveProfile(){

localStorage.setItem(
"profileName",
document.getElementById("profileName").value
);

alert("Profile saved!");

}

function toggleTheme(){

document.body.classList.toggle("light");

localStorage.setItem(
"nexoraTheme",
document.body.classList.contains("light")
);

}

window.onload=function(){

if(localStorage.getItem("nexoraChat")){
document.getElementById("chat").innerHTML=
localStorage.getItem("nexoraChat");
}

if(localStorage.getItem("notesData")){
document.getElementById("notesArea").value=
localStorage.getItem("notesData");
}

if(localStorage.getItem("profileName")){
document.getElementById("profileName").value=
localStorage.getItem("profileName");
}

if(localStorage.getItem("nexoraTheme")==="true"){
document.body.classList.add("light");
}

renderProjects();
updateDashboard();

};

document.addEventListener("keydown",function(e){

if(
e.key==="Enter" &&
document.activeElement===
document.getElementById("msg")
){
sendMessage();
}

});

</script>

</body>
</html>
