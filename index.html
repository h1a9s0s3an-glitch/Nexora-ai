<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora v2.4</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
height:100vh;
display:flex;
flex-direction:column;
transition:.3s;
}

body.light{
background:#f5f5f5;
color:black;
}

header{
background:#1e293b;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:24px;
font-weight:bold;
}

body.light header{
background:#dddddd;
color:black;
}

.theme-btn{
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
}

.tab{
display:none;
flex:1;
overflow-y:auto;
}

.active{
display:block;
}

.page{
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:15px;
margin-top:15px;
animation:fadeIn .3s ease;
}

body.light .card{
background:white;
color:black;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.stat{
font-size:30px;
font-weight:bold;
margin-top:10px;
}

.profile-card{
text-align:center;
}

.avatar{
font-size:50px;
margin-bottom:10px;
}

.search-box{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
}

textarea{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
min-height:150px;
}

.save-btn{
margin-top:10px;
padding:10px 15px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

.bottom-nav{
height:70px;
background:#111827;
display:flex;
justify-content:space-around;
align-items:center;
}

.bottom-nav button{
background:none;
border:none;
color:white;
font-size:14px;
cursor:pointer;
}

body.light .bottom-nav{
background:#cccccc;
}

body.light .bottom-nav button{
color:black;
}

</style>
</head>

<body>

<header>
🚀 Nexora v2.4
<button class="theme-btn" onclick="toggleTheme()">🌙</button>
</header>
<div id="homeTab" class="tab active page">

<h2>🏠 Dashboard</h2>

<div class="card">
Total Messages
<div class="stat" id="msgCount">0</div>
</div>

<div class="card">
Saved Notes
<div class="stat" id="noteCount">0</div>
</div>

<div class="card">
Projects
<div class="stat" id="projectCount">0</div>
</div>

<div class="card">
Recent Activity
<div id="activityBox">
No activity yet.
</div>
</div>

</div>

<div id="notesTab" class="tab page">

<h2>📝 Smart Notes</h2>

<input
class="search-box"
id="noteSearch"
placeholder="🔍 Search notes..."
onkeyup="searchNotes()">

<textarea
id="notesArea"
placeholder="Write your notes here...">
</textarea>

<button
class="save-btn"
onclick="saveNotes()">
💾 Save Notes
</button>

</div>

<div id="projectsTab" class="tab page">

<h2>📊 Projects</h2>

<input
class="search-box"
id="projectName"
placeholder="Project Name">

<textarea
id="projectDesc"
placeholder="Project Description">
</textarea>

<select
id="projectStatus"
class="search-box">

<option>🟢 Active</option>
<option>🟡 Pending</option>
<option>✅ Completed</option>

</select>

<button
class="save-btn"
onclick="addProject()">
➕ Add Project
</button>

<div id="projectsList"></div>

</div>

<div id="profileTab" class="tab page">

<h2>👤 Profile</h2>

<div class="card profile-card">

<div class="avatar" id="avatar">
🚀
</div>

<input
class="search-box"
id="profileName"
placeholder="Your Name">

<input
class="search-box"
id="avatarInput"
placeholder="Avatar Emoji">

<button
class="save-btn"
onclick="saveProfile()">
💾 Save Profile
</button>

</div>

</div>

<div id="settingsTab" class="tab page">

<h2>⚙️ Settings</h2>

<div class="card">
Theme, preferences and storage.
</div>

</div>

<div class="bottom-nav">

<button onclick="showTab('homeTab')">
🏠<br>Home
</button>

<button onclick="showTab('notesTab')">
📝<br>Notes
</button>

<button onclick="showTab('projectsTab')">
📊<br>Projects
</button>

<button onclick="showTab('profileTab')">
👤<br>Profile
</button>

<button onclick="showTab('settingsTab')">
⚙️<br>Settings
</button>

</div>
<script>

let messageCount =
Number(localStorage.getItem("messageCount") || 0);

function showTab(id){

document.querySelectorAll(".tab").forEach(tab=>{
tab.classList.remove("active");
});

document.getElementById(id).classList.add("active");

}

function updateDashboard(){

document.getElementById("msgCount").innerText =
messageCount;

document.getElementById("noteCount").innerText =
localStorage.getItem("notesData") ? 1 : 0;

const projects =
JSON.parse(localStorage.getItem("projects") || "[]");

document.getElementById("projectCount").innerText =
projects.length;

}

function setActivity(text){

localStorage.setItem("activity",text);

const box=document.getElementById("activityBox");

if(box){
box.innerText=text;
}

}

function saveNotes(){

const notes =
document.getElementById("notesArea").value;

localStorage.setItem(
"notesData",
notes
);

setActivity("📝 Notes updated");

updateDashboard();

alert("Notes saved!");

}

function searchNotes(){

const notes =
localStorage.getItem("notesData") || "";

const query =
document.getElementById("noteSearch")
.value
.toLowerCase();

if(query.length===0){

document.getElementById("notesArea").value =
notes;

return;

}

if(notes.toLowerCase().includes(query)){

document.getElementById("notesArea").value =
notes;

}else{

document.getElementById("notesArea").value =
"No matching notes found.";

}

}

function addProject(){

const name =
document.getElementById("projectName").value;

const desc =
document.getElementById("projectDesc").value;

const status =
document.getElementById("projectStatus").value;

if(!name) return;

const projects =
JSON.parse(
localStorage.getItem("projects") || "[]"
);

projects.push({
name:name,
desc:desc,
status:status
});

localStorage.setItem(
"projects",
JSON.stringify(projects)
);

renderProjects();

updateDashboard();

setActivity("📊 Project added");

document.getElementById("projectName").value="";
document.getElementById("projectDesc").value="";

}

function renderProjects(){

const container =
document.getElementById("projectsList");

container.innerHTML="";

const projects =
JSON.parse(
localStorage.getItem("projects") || "[]"
);

projects.forEach(project=>{

container.innerHTML +=
'<div class="card"><h3>'+
project.name+
'</h3><p>'+
project.desc+
'</p><br><b>'+
project.status+
'</b></div>';

});

}

function saveProfile(){

const name =
document.getElementById("profileName").value;

const avatar =
document.getElementById("avatarInput").value || "🚀";

localStorage.setItem(
"profileName",
name
);

localStorage.setItem(
"profileAvatar",
avatar
);

document.getElementById("avatar").innerText =
avatar;

setActivity("👤 Profile updated");

alert("Profile saved!");

}

function toggleTheme(){

document.body.classList.toggle("light");

localStorage.setItem(
"nexoraTheme",
document.body.classList.contains("light")
);

}

window.onload=function(){

const savedNotes =
localStorage.getItem("notesData");

if(savedNotes){

document.getElementById("notesArea").value =
savedNotes;

}

const savedName =
localStorage.getItem("profileName");

if(savedName){

document.getElementById("profileName").value =
savedName;

}

const savedAvatar =
localStorage.getItem("profileAvatar");

if(savedAvatar){

document.getElementById("avatar").innerText =
savedAvatar;

document.getElementById("avatarInput").value =
savedAvatar;

}

const activity =
localStorage.getItem("activity");

if(activity){

document.getElementById("activityBox").innerText =
activity;

}

if(localStorage.getItem("nexoraTheme")==="true"){

document.body.classList.add("light");

}

renderProjects();
updateDashboard();

};

</script>

</body>
</html>
