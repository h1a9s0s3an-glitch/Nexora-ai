<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora Workspace v2.1</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
height:100vh;
background:#0f172a;
color:white;
transition:0.3s;
}

body.light{
background:#f5f5f5;
color:black;
}

.sidebar{
width:230px;
background:#111827;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
transition:0.3s;
}

body.light .sidebar{
background:#dddddd;
}

.sidebar button{
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
background:#1e293b;
color:white;
font-size:15px;
}

body.light .sidebar button{
background:#bbbbbb;
color:black;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

header{
padding:15px;
background:#1e293b;
font-size:24px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

body.light header{
background:#cccccc;
color:black;
}

.theme-btn{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.tab{
display:none;
height:100%;
}

.active{
display:block;
}

#chat{
height:calc(100vh - 180px);
overflow-y:auto;
padding:15px;
}

.message{
padding:12px;
margin:10px 0;
border-radius:12px;
max-width:80%;
}

.user{
background:#2563eb;
margin-left:auto;
}

.ai{
background:#334155;
}

body.light .ai{
background:#e5e5e5;
color:black;
}

.input-area{
display:flex;
padding:10px;
background:#1e293b;
}

body.light .input-area{
background:#cccccc;
}

.input-area input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
}

.send-btn{
margin-left:10px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

.page{
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-top:15px;
}

body.light .card{
background:white;
color:black;
}

.tools{
padding:10px;
display:flex;
gap:10px;
}

.tools button{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

@media(max-width:768px){

.sidebar{
width:90px;
}

.sidebar button{
font-size:11px;
padding:10px;
}

header{
font-size:18px;
}
}

</style>
</head>

<body>

<div class="sidebar">

<button onclick="showTab('chatTab')">💬 Chat</button>
<button onclick="showTab('imagesTab')">🖼 Images</button>
<button onclick="showTab('filesTab')">📄 Files</button>
<button onclick="showTab('codeTab')">💻 Code</button>
<button onclick="showTab('notesTab')">📝 Notes</button>
<button onclick="showTab('projectsTab')">📊 Projects</button>

</div>

<div class="main">

<header>
🚀 Nexora Workspace v2.1
<button class="theme-btn" onclick="toggleTheme()">🌙</button>
</header>
<div id="chatTab" class="tab active">

<div class="tools">
<button onclick="clearChat()">🗑 Clear</button>
<button onclick="copyChat()">📋 Copy</button>
</div>

<div id="chat">

<div class="message ai">
Welcome to Nexora Workspace 🚀
</div>

</div>

<div class="input-area">
<input id="msg" placeholder="Ask Nexora anything...">
<button class="send-btn" onclick="sendMessage()">Send</button>
</div>

</div>

<div id="imagesTab" class="tab page">
<h2>🖼 Images</h2>

<div class="card">
Image generation workspace coming soon.
</div>

</div>

<div id="filesTab" class="tab page">
<h2>📄 Files</h2>

<div class="card">
Upload and analyze files here.
</div>

</div>

<div id="codeTab" class="tab page">
<h2>💻 Code</h2>

<div class="card">
Generate and debug code here.
</div>

</div>

<div id="notesTab" class="tab page">
<h2>📝 Notes</h2>

<div class="card">
Create and save notes here.
</div>

</div>

<div id="projectsTab" class="tab page">
<h2>📊 Projects</h2>

<div class="card">
Manage your AI projects here.
</div>

</div>
</div>

<script>

function showTab(id){

document.querySelectorAll(".tab").forEach(tab=>{
tab.classList.remove("active");
});

document.getElementById(id).classList.add("active");

}

function sendMessage(){

const input=document.getElementById("msg");
const chat=document.getElementById("chat");

if(!input.value.trim()) return;

const text=input.value;

let user=document.createElement("div");
user.className="message user";
user.innerText=text;
chat.appendChild(user);

input.value="";

let ai=document.createElement("div");
ai.className="message ai";
ai.innerText="⚠️ AI service is currently unavailable. Please try again later.";
chat.appendChild(ai);

chat.scrollTop=chat.scrollHeight;

localStorage.setItem(
"nexoraChat",
chat.innerHTML
);

}

function clearChat(){

document.getElementById("chat").innerHTML=
'<div class="message ai">Chat cleared 🚀</div>';

localStorage.removeItem("nexoraChat");

}

function copyChat(){

navigator.clipboard.writeText(
document.getElementById("chat").innerText
);

alert("Chat copied!");

}

function toggleTheme(){

document.body.classList.toggle("light");

localStorage.setItem(
"nexoraTheme",
document.body.classList.contains("light")
);

}

window.onload=function(){

const savedChat=
localStorage.getItem("nexoraChat");

if(savedChat){

document.getElementById("chat").innerHTML=
savedChat;

}

const theme=
localStorage.getItem("nexoraTheme");

if(theme==="true"){

document.body.classList.add("light");

}

};

document.addEventListener("keydown",function(e){

if(
e.key==="Enter" &&
document.activeElement===
document.getElementById("msg")
){

sendMessage();

}

});

</script>

</body>
</html>
